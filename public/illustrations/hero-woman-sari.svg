<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 760" width="520" height="760">
  <defs>
    <!-- Skin gradient — warm, dimensional -->
    <linearGradient id="skin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8CBAF"/>
      <stop offset="50%" stop-color="#D4AD8C"/>
      <stop offset="100%" stop-color="#C49A78"/>
    </linearGradient>
    <!-- Hair gradient — deep with sheen -->
    <linearGradient id="hair" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#2C2420"/>
      <stop offset="40%" stop-color="#1A1412"/>
      <stop offset="100%" stop-color="#0E0A08"/>
    </linearGradient>
    <!-- Sari gradient — rich sindoor with depth -->
    <linearGradient id="sari-main" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#A82218"/>
      <stop offset="35%" stop-color="#8A1C14"/>
      <stop offset="100%" stop-color="#6E1510"/>
    </linearGradient>
    <!-- Sari highlight -->
    <linearGradient id="sari-light" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#C42A1E" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8A1C14" stop-opacity="0"/>
    </linearGradient>
    <!-- Pallu gradient — gold -->
    <linearGradient id="pallu" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4B06A"/>
      <stop offset="50%" stop-color="#C5A059"/>
      <stop offset="100%" stop-color="#A8873E"/>
    </linearGradient>
    <!-- Blouse gradient -->
    <linearGradient id="blouse" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6E1510"/>
      <stop offset="100%" stop-color="#4A0E0B"/>
    </linearGradient>
    <!-- Shadow -->
    <radialGradient id="shadow-base" cx="0.5" cy="1" r="0.5">
      <stop offset="0%" stop-color="#1A1918" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1A1918" stop-opacity="0"/>
    </radialGradient>
    <!-- Lip color -->
    <linearGradient id="lips" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B33A30"/>
      <stop offset="100%" stop-color="#8A1C14"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="260" cy="745" rx="140" ry="12" fill="url(#shadow-base)"/>

  <!-- ═══ SARI BODY — lower drape ═══ -->
  <path d="M155,380 C155,380 140,480 135,560 C130,640 128,720 130,740 L380,740 C380,740 378,680 370,600 C362,520 350,440 340,400 C340,400 290,420 260,425 C230,430 180,410 155,380Z" fill="url(#sari-main)"/>
  <!-- Fabric folds on lower sari -->
  <path d="M160,420 C180,460 175,540 170,620 C168,660 165,700 163,735" fill="none" stroke="#6E1510" stroke-width="1.5" opacity="0.5"/>
  <path d="M200,410 C210,480 205,560 200,640 C198,680 195,720 193,740" fill="none" stroke="#6E1510" stroke-width="1" opacity="0.4"/>
  <path d="M310,415 C305,480 300,560 298,640 C296,680 294,720 293,740" fill="none" stroke="#6E1510" stroke-width="1" opacity="0.35"/>
  <path d="M350,410 C345,470 340,540 338,620 C336,660 335,700 334,740" fill="none" stroke="#6E1510" stroke-width="1.5" opacity="0.4"/>
  <!-- Sari fabric sheen -->
  <path d="M180,430 C200,500 195,580 190,660 L210,660 C215,580 220,500 200,430Z" fill="url(#sari-light)"/>

  <!-- ═══ SKIN — exposed midriff ═══ -->
  <path d="M195,310 C195,310 185,340 180,370 C175,390 172,395 170,400 L200,400 C205,380 210,350 215,330 C220,315 215,310 195,310Z" fill="url(#skin)"/>
  <path d="M295,310 C295,310 305,340 310,370 C315,390 318,395 320,400 L290,400 C285,380 280,350 275,330 C270,315 275,310 295,310Z" fill="url(#skin)"/>

  <!-- ═══ BLOUSE ═══ -->
  <path d="M185,230 C185,230 175,260 178,290 C180,310 190,325 200,330 L290,330 C300,325 310,310 312,290 C315,260 305,230 305,230 C305,230 280,220 245,220 C210,220 185,230 185,230Z" fill="url(#blouse)"/>
  <!-- Blouse neckline detail -->
  <path d="M195,232 C210,224 230,220 245,220 C260,220 280,224 295,232" fill="none" stroke="#C5A059" stroke-width="1.8" opacity="0.7"/>
  <path d="M200,236 C215,229 232,226 245,226 C258,226 275,229 290,236" fill="none" stroke="#C5A059" stroke-width="0.8" opacity="0.5"/>

  <!-- ═══ ARMS ═══ -->
  <!-- Left arm -->
  <path d="M185,245 C170,260 145,290 125,320 C110,342 100,365 105,375 C110,385 120,378 130,365 C145,342 160,315 172,300" fill="url(#skin)" stroke="url(#skin)" stroke-width="0.5"/>
  <!-- Right arm -->
  <path d="M305,245 C320,260 345,290 365,320 C380,342 388,360 385,370 C382,380 372,375 362,360 C345,335 330,310 318,298" fill="url(#skin)" stroke="url(#skin)" stroke-width="0.5"/>
  <!-- Hand holding pallu -->
  <path d="M100,368 C95,375 98,382 105,380 C112,378 118,370 125,362 L115,355Z" fill="url(#skin)"/>

  <!-- ═══ PALLU — the draped fabric over shoulder ═══ -->
  <path d="M120,345 C140,330 170,335 200,340 C230,345 240,338 260,325 C280,312 295,298 305,280 C315,262 325,238 330,228 L340,235 C335,255 322,282 308,302 C290,328 265,348 240,358 C215,368 185,372 160,370 C135,368 115,360 120,345Z" fill="url(#pallu)"/>
  <!-- Pallu fold lines -->
  <path d="M140,345 C165,338 195,343 220,345 C245,347 268,335 285,318" fill="none" stroke="#A8873E" stroke-width="1" opacity="0.5"/>
  <path d="M150,355 C175,350 200,352 225,350 C250,348 272,340 290,325" fill="none" stroke="#D4B06A" stroke-width="0.8" opacity="0.4"/>
  <!-- Zari border on pallu -->
  <path d="M118,350 C140,335 175,342 210,348 C245,354 275,342 300,318" fill="none" stroke="#C5A059" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <path d="M116,354 C138,340 175,346 210,352 C245,358 275,346 302,322" fill="none" stroke="#C5A059" stroke-width="1" stroke-dasharray="3 5" opacity="0.5"/>

  <!-- ═══ NECK ═══ -->
  <path d="M225,210 C225,190 230,185 245,180 C260,185 265,190 265,210 L260,220 C255,222 250,223 245,223 C240,223 235,222 230,220Z" fill="url(#skin)"/>

  <!-- ═══ FACE ═══ -->
  <ellipse cx="245" cy="140" rx="52" ry="62" fill="url(#skin)"/>
  <!-- Subtle face shading -->
  <ellipse cx="260" cy="145" rx="30" ry="45" fill="#C49A78" opacity="0.15"/>

  <!-- ═══ HAIR ═══ -->
  <!-- Main hair mass -->
  <path d="M193,130 C190,90 200,55 230,40 C250,32 275,35 295,50 C315,65 325,90 320,120 C318,135 312,148 305,158 L302,140 C300,115 295,90 280,72 C265,58 245,52 228,60 C212,68 202,85 198,105Z" fill="url(#hair)"/>
  <!-- Hair volume/shape -->
  <path d="M193,130 C188,110 192,80 210,58 C228,38 260,30 290,45 C310,55 322,75 325,100 C327,115 325,130 320,142 C315,125 305,105 288,90 C270,76 248,72 230,80 C215,87 205,102 198,120Z" fill="url(#hair)"/>
  <!-- Flowing hair strands on the side -->
  <path d="M195,125 C188,145 183,175 182,200 C181,220 183,235 188,245" fill="none" stroke="#1A1412" stroke-width="8" stroke-linecap="round"/>
  <path d="M192,120 C184,142 178,170 176,200 C174,225 175,248 180,260" fill="none" stroke="#0E0A08" stroke-width="5" stroke-linecap="round"/>
  <path d="M315,142 C318,155 320,175 318,195 C316,210 312,222 308,230" fill="none" stroke="#1A1412" stroke-width="6" stroke-linecap="round"/>
  <!-- Hair sheen -->
  <path d="M220,50 C240,42 260,44 275,55" fill="none" stroke="#3D3028" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <path d="M225,60 C242,53 258,55 272,63" fill="none" stroke="#4A3C30" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

  <!-- ═══ FACIAL FEATURES ═══ -->
  <!-- Eyebrows — refined arches -->
  <path d="M215,118 C222,112 234,110 242,113" fill="none" stroke="#2C2420" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M255,110 C263,106 275,107 282,112" fill="none" stroke="#2C2420" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Eyes — almond-shaped, detailed -->
  <ellipse cx="230" cy="130" rx="12" ry="7" fill="#FDFAF2"/>
  <ellipse cx="270" cy="128" rx="12" ry="7" fill="#FDFAF2"/>
  <circle cx="231" cy="130" r="5" fill="#2C1810"/>
  <circle cx="271" cy="128" r="5" fill="#2C1810"/>
  <circle cx="232" cy="129" r="2" fill="#0A0806"/>
  <circle cx="272" cy="127" r="2" fill="#0A0806"/>
  <!-- Eye highlights -->
  <circle cx="233.5" cy="128" r="1.2" fill="#FFF" opacity="0.8"/>
  <circle cx="273.5" cy="126" r="1.2" fill="#FFF" opacity="0.8"/>
  <!-- Eyeliner — elegant wing -->
  <path d="M217,130 C220,127 226,124 238,124 C241,124 243,126 242,129" fill="none" stroke="#1A1412" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M257,128 C260,125 266,122 278,122 C281,122 283,124 282,127" fill="none" stroke="#1A1412" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Lower lash line -->
  <path d="M220,133 C226,136 234,137 242,135" fill="none" stroke="#2C2420" stroke-width="0.8" opacity="0.5"/>
  <path d="M260,131 C266,134 274,135 282,133" fill="none" stroke="#2C2420" stroke-width="0.8" opacity="0.5"/>

  <!-- Nose — refined, subtle -->
  <path d="M247,135 C246,145 244,155 240,162 C237,166 235,168 238,170 C241,172 245,172 248,171 C251,170 252,167 250,164" fill="none" stroke="#B8977A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Lips — full, defined -->
  <path d="M232,180 C236,176 242,174 248,176 C254,174 260,176 264,180 C260,185 254,188 248,188 C242,188 236,185 232,180Z" fill="url(#lips)"/>
  <path d="M232,180 C238,178 244,177 248,178 C252,177 258,178 264,180" fill="none" stroke="#8A1C14" stroke-width="0.8" opacity="0.6"/>
  <!-- Lower lip highlight -->
  <ellipse cx="248" cy="184" rx="8" ry="3" fill="#C44838" opacity="0.3"/>

  <!-- ═══ BINDI ═══ -->
  <circle cx="248" cy="102" r="4" fill="#8A1C14"/>
  <circle cx="248" cy="102" r="2.5" fill="#A82218"/>
  <circle cx="248" cy="101" r="1" fill="#C42A1E" opacity="0.5"/>

  <!-- ═══ JEWELRY ═══ -->
  <!-- Necklace — layered -->
  <path d="M220,210 C230,218 240,222 250,222 C260,222 270,218 280,210" fill="none" stroke="#C5A059" stroke-width="2" stroke-linecap="round"/>
  <path d="M218,215 C228,224 240,228 250,228 C260,228 272,224 282,215" fill="none" stroke="#C5A059" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Necklace pendant -->
  <path d="M245,228 L250,238 L255,228" fill="#C5A059" stroke="#A8873E" stroke-width="0.5"/>
  <circle cx="250" cy="240" r="3" fill="#8A1C14" stroke="#C5A059" stroke-width="0.8"/>

  <!-- Earrings — jhumka style -->
  <!-- Left -->
  <circle cx="195" cy="158" r="3.5" fill="#C5A059"/>
  <path d="M190,162 L195,175 L200,162" fill="#C5A059"/>
  <circle cx="195" cy="177" r="4" fill="#C5A059" stroke="#A8873E" stroke-width="0.5"/>
  <circle cx="195" cy="177" r="2" fill="#8A1C14"/>
  <circle cx="192" cy="182" r="1.5" fill="#C5A059" opacity="0.7"/>
  <circle cx="198" cy="182" r="1.5" fill="#C5A059" opacity="0.7"/>
  <circle cx="195" cy="184" r="1.5" fill="#C5A059" opacity="0.7"/>
  <!-- Right -->
  <circle cx="300" cy="152" r="3.5" fill="#C5A059"/>
  <path d="M295,156 L300,169 L305,156" fill="#C5A059"/>
  <circle cx="300" cy="171" r="4" fill="#C5A059" stroke="#A8873E" stroke-width="0.5"/>
  <circle cx="300" cy="171" r="2" fill="#8A1C14"/>
  <circle cx="297" cy="176" r="1.5" fill="#C5A059" opacity="0.7"/>
  <circle cx="303" cy="176" r="1.5" fill="#C5A059" opacity="0.7"/>
  <circle cx="300" cy="178" r="1.5" fill="#C5A059" opacity="0.7"/>

  <!-- Bangles on left wrist -->
  <ellipse cx="110" cy="362" rx="14" ry="6" fill="none" stroke="#C5A059" stroke-width="2"/>
  <ellipse cx="110" cy="358" rx="13" ry="5.5" fill="none" stroke="#C5A059" stroke-width="1.2"/>
  <ellipse cx="110" cy="366" rx="13" ry="5.5" fill="none" stroke="#8A1C14" stroke-width="1.5"/>

  <!-- ═══ SARI ZARI BORDER — bottom hem ═══ -->
  <path d="M130,730 L380,730" fill="none" stroke="#C5A059" stroke-width="4" opacity="0.7"/>
  <path d="M130,734 L380,734" fill="none" stroke="#C5A059" stroke-width="1.5" stroke-dasharray="4 6" opacity="0.5"/>
  <path d="M130,726 L380,726" fill="none" stroke="#C5A059" stroke-width="1" opacity="0.35"/>

  <!-- ═══ SARI DECORATIVE PATTERN — subtle Jamdani motifs ═══ -->
  <!-- Small diamond motifs scattered on sari -->
  <g opacity="0.15" fill="#C5A059">
    <path d="M200,500 l5,-8 5,8 -5,8z"/>
    <path d="M280,520 l5,-8 5,8 -5,8z"/>
    <path d="M230,580 l5,-8 5,8 -5,8z"/>
    <path d="M320,560 l5,-8 5,8 -5,8z"/>
    <path d="M170,620 l5,-8 5,8 -5,8z"/>
    <path d="M300,640 l5,-8 5,8 -5,8z"/>
    <path d="M250,660 l4,-6 4,6 -4,6z"/>
    <path d="M190,700 l4,-6 4,6 -4,6z"/>
    <path d="M340,690 l4,-6 4,6 -4,6z"/>
  </g>

  <!-- Subtle body outline for definition -->
  <path d="M225,210 L230,220 C235,222 240,223 245,223 C250,223 255,222 260,220 L265,210" fill="none" stroke="#B8977A" stroke-width="0.8" opacity="0.4"/>

  <!-- ═══ FLOWING SARI ACCENT LINES ═══ -->
  <path d="M370,420 C340,480 300,540 260,580 C220,620 170,660 140,700" fill="none" stroke="#B3241C" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <path d="M375,460 C350,510 310,560 270,600 C230,640 180,680 150,720" fill="none" stroke="#C5A059" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
</svg>
